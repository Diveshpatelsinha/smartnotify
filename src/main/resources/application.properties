# ===================================================
# APPLICATION
# ===================================================
spring.application.name=smartnotify-backend
server.port=8080

# ===================================================
# DATABASE (MySQL)
# ===================================================
spring.datasource.url=jdbc:mysql://localhost:3306/smartnotify_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================
# JPA / HIBERNATE
# ===================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===================================================
# JWT
# ===================================================
smartnotify.jwt.secret=6nHIHeNUDXPDANUFjEFCCLkmclzJwOoXbv3LsBsdp90=
smartnotify.jwt.expiration-ms=86400000

# ===================================================
# LOGGING
# ===================================================
logging.level.org.springframework.security=DEBUG
logging.level.com.smartnotify=DEBUG

# ===================================================
# JACKSON (JSON formatting)
# Jackson 3 already serializes dates as ISO-8601 strings by default -
# the old write-dates-as-timestamps=false property is removed (no longer needed)
# ===================================================
spring.jackson.time-zone=UTC