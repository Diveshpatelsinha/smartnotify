spring.application.name=smartnotify-backend
# ===================================================
# APPLICATION
# ===================================================

server.port=8080

# ===================================================
# DATABASE (MySQL)
# ===================================================
spring.datasource.url=jdbc:mysql://localhost:3306/notifyme_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================
# JPA / HIBERNATE
# ===================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===================================================
# JWT (used later in Step 12)
# ===================================================
notifyme.jwt.secret=YOUR_BASE64_ENCODED_256_BIT_SECRET_KEY_GOES_HERE
notifyme.jwt.expiration-ms=86400000

# ===================================================
# LOGGING
# ===================================================
logging.level.org.springframework.security=DEBUG
logging.level.com.notifyme=DEBUG

# ===================================================
# JACKSON (JSON formatting)
# ===================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC